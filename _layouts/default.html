<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/projects/llm-infra-design-studio/' | relative_url }}">Project</a>
          <a href="{{ '/articles/building-llm-assisted-infrastructure-design-lifecycle/' | relative_url }}">Articles</a>
          <a href="https://github.com/rakawa0825">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Public-safe technical portfolio by Naoyuki Hirakawa. No private project data is included.</p>
      </div>
    </footer>
  </body>
</html>
